name: spark ci/cd pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
    build-and-run:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up JDK 11
          uses: actions/setup-java@v2
          with:
            distribution: 'temurin'
            java-version: '11'

        
        - name: set up docker
          run: docker --version

        - name: Build docker image
          run: docker build -t spark-local .

        - name: Run Spark job
          run: |
            docker run --rm spark-local